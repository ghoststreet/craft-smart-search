name: tests

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }} · tests + static analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: craft_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s --health-timeout=5s --health-retries=10

      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_search_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s --health-timeout=5s --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pdo, pdo_mysql, pdo_pgsql, intl, mbstring, gd, bcmath, exif, fileinfo, iconv, dom, xml
          coverage: pcov
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare test env
        run: |
          cp tests/.env.example tests/.env
          # Enable pgvector
          PGPASSWORD=postgres psql -h 127.0.0.1 -U postgres -d ai_search_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      # Tests run FIRST — a failing test is the headline error, before lint noise.
      - name: Run tests
        run: composer run test

      - name: Coding standards
        run: composer run check-cs

      - name: Static analysis
        run: composer run phpstan

  deploy-gate:
    name: deploy gate
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - run: echo "All tests green on ${{ github.ref }}. Plug your deploy step here."
